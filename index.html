<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JavaCode — LeetCode-Style Problem Explorer</title>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--bg4:#2e3248;
  --border:#3a3f5c;--border2:#4a5070;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --blue:#3b82f6;--blue2:#60a5fa;--blue3:#1d4ed8;
  --green:#22c55e;--green2:#16a34a;
  --yellow:#f59e0b;--yellow2:#d97706;
  --red:#ef4444;--red2:#dc2626;
  --purple:#a855f7;--cyan:#06b6d4;
  --accent:#3b82f6;--accent-hover:#2563eb;
  --tag-bg:#1e3a5f;--tag-text:#60a5fa;
  --easy:#22c55e;--medium:#f59e0b;--hard:#ef4444;
  --code-bg:#0d1117;--code-text:#e6edf3;
  --kw:#ff7b72;--str:#a5d6ff;--num:#79c0ff;
  --cmt:#8b949e;--type:#ffa657;--ann:#d2a8ff;
  --fn:#d2a8ff;--cls:#f0883e;
}
.light{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--bg4:#e2e8f0;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --tag-bg:#dbeafe;--tag-text:#1d4ed8;
  --code-bg:#f6f8fa;--code-text:#24292e;
  --kw:#d73a49;--str:#032f62;--num:#005cc5;
  --cmt:#6a737d;--type:#e36209;--ann:#6f42c1;
  --fn:#6f42c1;--cls:#e36209;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;
          background:var(--bg);color:var(--text);overflow:hidden}

/* ── NAVBAR ──────────────────────────────────────────────────────── */
.nav{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
     display:flex;align-items:center;padding:0 20px;gap:16px;
     position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#3b82f6,#a855f7);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;
          letter-spacing:-0.5px;white-space:nowrap}
.nav-logo span{font-size:11px;background:none;-webkit-text-fill-color:var(--text3);
               font-weight:400;letter-spacing:0;margin-left:4px}
.nav-stats{display:flex;gap:14px;margin-left:auto;font-size:12px;color:var(--text3)}
.nav-stats b{color:var(--text)}
.nav-btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;
         font-size:12px;font-weight:600;transition:all .15s}
.nav-btn.primary{background:var(--blue);color:#fff}
.nav-btn.primary:hover{background:var(--blue3)}
.nav-btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.nav-btn.ghost:hover{background:var(--bg3)}

/* ── LAYOUT ──────────────────────────────────────────────────────── */
.layout{display:flex;height:calc(100vh - 52px);overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────────────────────── */
.sidebar{width:400px;flex-shrink:0;background:var(--bg2);
         border-right:1px solid var(--border);
         display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:12px 14px;border-bottom:1px solid var(--border);
             display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);
                   border-radius:8px;padding:8px 12px 8px 34px;color:var(--text);
                   font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);
                  color:var(--text3);pointer-events:none;font-size:14px}
.filter-row{display:flex;gap:6px}
.filter-btn{flex:1;padding:5px 8px;border-radius:6px;border:none;cursor:pointer;
            font-size:11.5px;font-weight:600;background:var(--bg3);
            color:var(--text2);transition:all .15s}
.filter-btn:hover{background:var(--bg4)}
.filter-btn.active{color:#fff}
.filter-btn.all.active{background:var(--blue)}
.filter-btn.easy.active{background:var(--green2)}
.filter-btn.medium.active{background:var(--yellow2)}
.filter-btn.hard.active{background:var(--red2)}

/* progress bar */
.progress-wrap{padding:0 2px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;
                color:var(--text3);margin-bottom:4px}
.progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));
               border-radius:2px;transition:width .4s}

/* problem list */
.prob-list{overflow-y:auto;flex:1}
.prob-list::-webkit-scrollbar{width:4px}
.prob-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.prob-row{display:flex;align-items:center;padding:10px 14px;gap:10px;
          cursor:pointer;border-bottom:1px solid var(--border);
          transition:background .12s;position:relative}
.prob-row:hover{background:var(--bg3)}
.prob-row.active{background:var(--bg4)}
.prob-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;
                         width:3px;background:var(--blue);border-radius:0 2px 2px 0}
.prob-row.solved .prob-num::after{content:'✓';color:var(--green);
                                   font-size:9px;margin-left:3px}
.prob-num{font-size:11.5px;color:var(--text3);width:30px;flex-shrink:0;font-weight:600}
.prob-title-wrap{flex:1;min-width:0}
.prob-title-text{font-size:13px;font-weight:500;color:var(--text);
                 white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prob-tags-row{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.prob-tag{font-size:10px;padding:1px 6px;border-radius:9px;
          background:var(--tag-bg);color:var(--tag-text);font-weight:600}
.prob-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.diff-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:9px}
.diff-badge.Easy{color:var(--easy);background:#052e16}
.diff-badge.Medium{color:var(--yellow);background:#422006}
.diff-badge.Hard{color:var(--red);background:#450a0a}
.light .diff-badge.Easy{background:#dcfce7}
.light .diff-badge.Medium{background:#fef9c3}
.light .diff-badge.Hard{background:#fee2e2}
.acc-rate{font-size:10px;color:var(--text3)}

/* ── CONTENT ─────────────────────────────────────────────────────── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* problem header */
.prob-header{padding:16px 24px 0;flex-shrink:0}
.prob-header-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.prob-header h1{font-size:20px;font-weight:700;color:var(--text)}
.prob-header .diff-pill{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.prob-header .diff-pill.Easy{color:var(--easy);background:#052e1650}
.prob-header .diff-pill.Medium{color:var(--yellow);background:#42200650}
.prob-header .diff-pill.Hard{color:var(--red);background:#450a0a50}
.tag-list{display:flex;gap:6px;flex-wrap:wrap}
.tag-pill{font-size:11px;padding:3px 10px;border-radius:12px;
          background:var(--tag-bg);color:var(--tag-text);font-weight:600}
.complexity-row{display:flex;gap:12px;margin-top:8px}
.cplx{font-size:11.5px;color:var(--text3)}
.cplx b{color:var(--cyan);font-family:'Consolas',monospace}

/* tabs */
.tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border);
      flex-shrink:0;margin-top:10px}
.tab-btn{padding:10px 18px;font-size:13px;font-weight:600;color:var(--text3);
         border:none;background:transparent;cursor:pointer;
         border-bottom:2px solid transparent;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--blue2);border-bottom-color:var(--blue2)}

/* tab panels */
.tab-panels{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-panel{display:none;flex:1;overflow-y:auto;padding:20px 24px}
.tab-panel.active{display:block}
.tab-panel::-webkit-scrollbar{width:5px}
.tab-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* description */
.desc-text{font-size:13.5px;line-height:1.7;color:var(--text2)}
.desc-text p{margin-bottom:12px}
.ex-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
          padding:12px 16px;margin-bottom:10px;font-size:13px}
.ex-block .ex-label{font-weight:700;color:var(--text3);margin-bottom:6px;font-size:11.5px}
.ex-block code{font-family:'Consolas',monospace;color:var(--text)}
.constraint-list{margin-top:12px}
.constraint-list li{font-family:'Consolas',monospace;font-size:12.5px;
                    color:var(--text2);margin-bottom:4px;list-style:disc;
                    margin-left:18px}

/* approach */
.approach-card{background:var(--bg2);border:1px solid var(--border);
               border-radius:10px;padding:16px;margin-bottom:14px}
.approach-card h3{font-size:13.5px;font-weight:700;color:var(--blue2);margin-bottom:8px;
                  display:flex;align-items:center;gap:8px}
.approach-card .icon{width:22px;height:22px;border-radius:50%;background:var(--blue3);
                     display:flex;align-items:center;justify-content:center;font-size:12px;
                     flex-shrink:0}
.approach-card p{font-size:13px;color:var(--text2);line-height:1.65}
.step-list{counter-reset:step;margin-top:10px}
.step-list li{counter-increment:step;display:flex;gap:10px;margin-bottom:10px;
              font-size:13px;color:var(--text2);line-height:1.55;align-items:flex-start}
.step-list li::before{content:counter(step);width:22px;height:22px;border-radius:50%;
                      background:var(--blue3);color:#fff;font-size:11px;font-weight:700;
                      display:flex;align-items:center;justify-content:center;flex-shrink:0;
                      margin-top:1px}

/* code panel */
.code-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0}
.code-toolbar .lang-badge{background:var(--bg3);border:1px solid var(--border);
                           border-radius:5px;padding:3px 10px;font-size:11.5px;
                           font-weight:700;color:var(--yellow)}
.code-toolbar .spacer{flex:1}
.copy-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);
          background:var(--bg3);color:var(--text2);font-size:11.5px;font-weight:600;
          cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--bg4);color:var(--text)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}

/* code block */
.code-wrap{background:var(--code-bg);border:1px solid var(--border);
           border-radius:10px;overflow:hidden;font-size:13px}
.code-pre{overflow-x:auto;padding:0}
.code-pre::-webkit-scrollbar{height:5px}
.code-pre::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
table.code-table{border-collapse:collapse;width:100%;font-family:'Consolas',monospace;
                  font-size:13px;line-height:1.6}
table.code-table td{padding:0;vertical-align:top}
.ln-col{user-select:none;color:var(--text3);padding:14px 14px 14px 18px;
        text-align:right;min-width:46px;border-right:1px solid var(--border);
        font-size:12px;background:var(--code-bg)}
.code-col{padding:14px 20px;white-space:pre;color:var(--code-text);
          background:var(--code-bg)}

/* java syntax colours */
.kw{color:var(--kw);font-weight:600}
.str{color:var(--str)}
.num{color:var(--num)}
.cmt{color:var(--cmt);font-style:italic}
.type{color:var(--type)}
.ann{color:var(--ann)}
.fn{color:var(--fn)}
.cls{color:var(--cls)}

/* empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
             height:100%;gap:16px;color:var(--text3)}
.empty-state .big{font-size:56px}
.empty-state h2{font-size:18px;font-weight:600;color:var(--text2)}
.empty-state p{font-size:13px;text-align:center;max-width:320px;line-height:1.6}

/* solved indicator */
.solved-icon{color:var(--green);font-size:13px}

/* toast */
#toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;
       padding:10px 18px;border-radius:8px;font-size:13px;
       box-shadow:0 8px 24px #0006;opacity:0;transform:translateY(6px);
       transition:all .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}


/* ── MASTERCARD THEME ── */
:root { --mc-red:#eb001b; --mc-orange:#f79e1b; --mc-gold:#ffb600; }
.filter-btn.mc.active{background:linear-gradient(135deg,#eb001b,#f79e1b);color:#fff}
.mc-badge{display:inline-flex;align-items:center;gap:3px;
          background:linear-gradient(135deg,#eb001b,#f79e1b);
          color:#fff;font-size:9.5px;padding:1px 7px;
          border-radius:9px;font-weight:700;letter-spacing:.3px}
.prob-row.active.has-mc::before{background:linear-gradient(180deg,#eb001b,#f79e1b)}
.mc-header{display:flex;align-items:center;gap:10px;
           padding:10px 16px;margin-bottom:14px;border-radius:8px;
           background:linear-gradient(135deg,#1a0608,#1a0c00);
           border:1px solid #eb001b40}
.mc-logo{font-size:22px}
.mc-header-text h3{font-size:13px;font-weight:700;color:#f79e1b;margin:0}
.mc-header-text p{font-size:11.5px;color:var(--text2);margin:2px 0 0}
.mc-section{background:linear-gradient(135deg,#eb001b08,#f79e1b08);
            border:1px solid #f79e1b30;border-radius:8px;
            padding:14px;margin-bottom:12px}
.mc-section h4{font-size:12px;font-weight:700;color:#f79e1b;margin-bottom:8px}
.mc-freq-badge{display:inline-block;padding:2px 8px;border-radius:9px;
               font-size:10px;font-weight:700;margin-left:8px}
.mc-freq-badge.high{background:#052e16;color:#22c55e}
.mc-freq-badge.very-high{background:#450a0a;color:#f87171}


/* ── SCHEMA DIAGRAMS ─────────────────────────────────────────────────────── */
.schema-wrap{padding:4px 0}
.schema-block{background:var(--bg2);border:1px solid var(--border);
              border-radius:10px;margin-bottom:14px;overflow:hidden}
.schema-block-title{padding:10px 16px;background:var(--bg3);
                    border-bottom:1px solid var(--border);
                    font-size:12px;font-weight:700;color:var(--blue2);
                    display:flex;align-items:center;gap:8px}
.schema-art{font-family:'Consolas','Courier New',monospace;font-size:12.5px;
            line-height:1.55;color:var(--code-text);padding:14px 18px;
            white-space:pre;overflow-x:auto;background:var(--code-bg);
            border-radius:0 0 10px 10px;margin:0}
.schema-art::-webkit-scrollbar{height:4px}
.schema-art::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.schema-caption{padding:10px 16px;font-size:12px;color:var(--text3);
                border-top:1px solid var(--border);background:var(--bg2);
                font-style:italic}
.schema-legend{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px;
               border-top:1px solid var(--border)}
.schema-legend-item{font-size:11px;padding:2px 8px;border-radius:5px;
                    background:var(--bg4);color:var(--text2);
                    font-family:'Consolas',monospace}

/* scrollbar global */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="nav-logo">JavaCode <span>Interview Prep</span></div>
  <div class="nav-stats">
    <span>Solved: <b id="solvedCount">0</b></span>
    <span>Easy: <b id="easyCount" style="color:var(--easy)">0</b></span>
    <span>Medium: <b id="medCount" style="color:var(--yellow)">0</b></span>
    <span>Hard: <b id="hardCount" style="color:var(--red)">0</b></span>
  </div>
  <button class="nav-btn ghost" onclick="toggleTheme()">🌙 Theme</button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="ico">🔍</span>
        <input type="text" id="searchInput" placeholder="Search problems…" oninput="filterProblems()"/>
      </div>
      <div class="filter-row">
        <button class="filter-btn all active" onclick="setFilter('All',this)">All</button>
        <button class="filter-btn easy" onclick="setFilter('Easy',this)">Easy</button>
        <button class="filter-btn medium" onclick="setFilter('Medium',this)">Medium</button>
        <button class="filter-btn hard" onclick="setFilter('Hard',this)">Hard</button>
        <button class="filter-btn mc" onclick="setFilter('Mastercard',this)">⭐ MC</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progress</span>
          <span id="progressLabel">0 / 20</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="prob-list" id="probList"></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="contentArea">
    <div class="empty-state">
      <div class="big">☕</div>
      <h2>Pick a Problem</h2>
      <p>Select a problem from the list on the left to view the description, approach, and optimal Java solution.</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

// ════════════════════════════════════════════════════════════════════════════
// SCHEMA DIAGRAMS  (keyed by problem id)
// ════════════════════════════════════════════════════════════════════════════
const SCHEMAS = {

1: `<div class="schema-wrap">
<div class="schema-block">
<div class="schema-block-title">📦 HashMap — Two Sum</div>
<pre class="schema-art">
Input:  nums=[2, 7, 11, 15]   target=9

i=0: num=2  complement=9-2=7   map.get(7)?  NO  → map.put(2→0)
i=1: num=7  complement=9-7=2   map.get(2)?  YES → return [0, 1] ✓

HashMap state at i=1:
┌─────────┬───────┐
│  Value  │ Index │
├─────────┼───────┤
│    2    │   0   │  ← complement found here
│    7    │   1   │
└─────────┴───────┘

Time: O(n) — one pass    Space: O(n) — hash map
</pre></div></div>`,

2: `<div class="schema-wrap">
<div class="schema-block">
<div class="schema-block-title">📚 Stack — Valid Parentheses</div>
<pre class="schema-art">
Input: ( { [ ] } )

Char  Action      Stack (left=bottom)
─────────────────────────────────────
 (    push        [ ( ]
 {    push        [ (, { ]
 [    push        [ (, {, [ ]
 ]    pop → '['   [ (, { ]    ✓ match
 }    pop → '{'   [ ( ]       ✓ match
 )    pop → '('   [ ]         ✓ match

Stack is empty after all chars → VALID ✓

Rule: push open brackets, pop & match on close
</pre></div></div>`,

3: `<div class="schema-wrap">
<div class="schema-block">
<div class="schema-block-title">🔗 Two Pointers — Merge Sorted Lists</div>
<pre class="schema-art">
L1: 1 → 3 → 5 → null
    ↑p1
L2: 2 → 4 → 6 → null
    ↑p2

Step  Compare  Take  Result so far
──────────────────────────────────
  1   1 &lt; 2     p1    1
  2   3 &gt; 2     p2    1 → 2
  3   3 &lt; 4     p1    1 → 2 → 3
  4   5 &gt; 4     p2    1 → 2 → 3 → 4
  5   5 &lt; 6     p1    1 → 2 → 3 → 4 → 5
  6   p1=null        1 → 2 → 3 → 4 → 5 → 6  ✓

Always advance the pointer with the smaller value.
</pre></div></div>`,

4: `<div class="schema-wrap">
<div class="schema-block">
<div class="schema-block-title">📈 Kadane's Algorithm — Maximum Subarray</div>
<pre class="schema-art">
Input: [-2, 1, -3, 4, -1, 2, 1, -5, 4]

 i   num   maxHere         maxAll
─────────────────────────────────────
 0   -2    max(-2,   -2)=  -2     -2
 1    1    max( 1, -2+1)=   1      1
 2   -3    max(-3,  1-3)=  -2      1
 3    4    max( 4, -2+4)=   4      4
 4   -1    max(-1,  4-1)=   3      4
 5    2    max( 2,  3+2)=   5      5
 6    1    max( 1,  5+1)=   6      6  ← peak
 7   -5    max(-5,  6-5)=   1      6
 8    4    max( 4,  1+4)=   5      6

maxHere = max(num, maxHere + num)
Answer: 6  (subarray: [4, -1, 2, 1])
</pre></div></div>`,

5: `<div class="schema-wrap">
<div class="schema-block">
<div class="schema-block-title">🪜 Dynamic Programming — Climbing Stairs</div>
<pre class="schema-art">
n=6 stairs  (Fibonacci-style DP)

Stair:  0   1   2   3   4   5   6
dp:    [1,  1,  2,  3,  5,  8, 13]
        ↑   ↑   ↑   ↑   ↑   ↑   ↑
       base     ↑ computed each step

dp[i] = dp[i-1] + dp[i-2]
  (1-step from i-1)  +  (2-step from i-2)

Pattern:  1  1  2  3  5  8  13  21  34 ...
                   Fibonacci!

Answer for n=6: dp[6] = 13
</pre></div></div>`,

6: `<div class="schema-wrap">
<div class="schema-block">

        Stack<Character> stack = new Stack<>();

  code:`import java.util.Arrays;

public class CoinChange {

    public int coinChange(int[] coins, int amount) {
        int[] dp = new int[amount + 1];

  code:`import java.util.*;

public class MergeIntervals {

    public int[][] merge(int[][] intervals) {
        // Sort by start time
        Arrays.sort(intervals, (a, b) -> a[0] - b[0]);

        List<int[]> merged = new ArrayList<>();
        merged.add(intervals[0]);

        for (int i = 1; i < intervals.length; i++) {
            int[] last = merged.get(merged.size() - 1);

            if (curr[0] <= last[1]) {

                merged.add(curr);
            }

  examples:[

  constraints:["1 ≤ capacity ≤ 3000","0 ≤ key ≤ 10⁴","0 ≤ value ≤ 10⁵","At most 2×10⁵ calls to get and put"],
  approach:`<p>Use Java's <strong>LinkedHashMap</strong> with access-order mode. It automatically moves accessed entries to the tail. Override <code>removeEldestEntry</code> to evict when over capacity.</p>`,
  steps:["Extend LinkedHashMap with accessOrder=true.","Override removeEldestEntry to evict when size > capacity.","get: return getOrDefault(key, -1).","put: call super.put(key, value)."],
  code:`import java.util.LinkedHashMap;
import java.util.Map;

public class LRUCache {

    private final int capacity;
    // LinkedHashMap in access-order mode: most recently used → tail
    private final LinkedHashMap<Integer, Integer> cache;

    public LRUCache(int capacity) {
        this.capacity = capacity;
        this.cache    = new LinkedHashMap<>(capacity, 0.75f, true) {
            @Override
            protected boolean removeEldestEntry(Map.Entry<Integer,Integer> eldest) {
                return size() > capacity;   // auto-evict LRU entry
            }
        };
    }

    public int get(int key) {
        // Accessing the key moves it to the "most recently used" tail
        return cache.getOrDefault(key, -1);
    }

    public void put(int key, int value) {
        cache.put(key, value);
    }
}`

  constraints:["1 ≤ nums.length ≤ 5000","All values of nums are unique","nums is an ascending array that is possibly rotated"],
  approach:`<p>Modified binary search. At every mid, one half is always sorted. Determine which half is sorted, then check if target falls within it — and eliminate the other half.</p>`,
  steps:["lo=0, hi=n-1.","At each mid: determine which half is sorted.","  Left sorted: nums[lo] ≤ nums[mid].","    If target in [lo..mid] → hi=mid-1, else lo=mid+1.","  Right sorted: nums[mid] ≤ nums[hi].","    If target in [mid..hi] → lo=mid+1, else hi=mid-1.","Return -1 if not found."],
  code:`public class SearchInRotatedSortedArray {

    public int search(int[] nums, int target) {
        int lo = 0, hi = nums.length - 1;

        while (lo <= hi) {
            int mid = lo + (hi - lo) / 2;

            if (nums[mid] == target) return mid;

            // Left half is sorted
            if (nums[lo] <= nums[mid]) {
                if (nums[lo] <= target && target < nums[mid]) {
                    hi = mid - 1;          // target in left half
                } else {
                    lo = mid + 1;          // target in right half

            }
            // Right half is sorted
            else {
                if (nums[mid] < target && target <= nums[hi]) {
                    lo = mid + 1;          // target in right half
                } else {
                    hi = mid - 1;          // target in left half
                }
            }
        }
        return -1;
    }

  code:`public class TrappingRainWater {

    public int trap(int[] height) {
        int lo       = 0, hi = height.length - 1;
        int leftMax  = 0, rightMax = 0;

            if (height[lo] < height[hi]) {
                // Left side is the bottleneck
                if (height[lo] >= leftMax) {

                    rightMax = height[hi];
                } else {

                }

        }

  steps:["maxHeap (lower half), minHeap (upper half).","addNum: add to maxHeap first, then balance.","  Always push maxHeap.top to minHeap.","  If minHeap.size > maxHeap.size → push minHeap.top back.","findMedian: if equal sizes → average tops; else maxHeap.peek()."],
  code:`import java.util.PriorityQueue;
import java.util.Collections;

public class MedianFinder {

    // Max-heap: stores the smaller half
    private PriorityQueue<Integer> maxHeap =
        new PriorityQueue<>(Collections.reverseOrder());

    // Min-heap: stores the larger half
    private PriorityQueue<Integer> minHeap =
        new PriorityQueue<>();

    public void addNum(int num) {
        maxHeap.offer(num);

        // Ensure every element in maxHeap <= every element in minHeap
        minHeap.offer(maxHeap.poll());

        // Rebalance: maxHeap can have at most 1 more element
        if (minHeap.size() > maxHeap.size()) {
            maxHeap.offer(minHeap.poll());
        }
    }

    public double findMedian() {
        if (maxHeap.size() == minHeap.size()) {
            // Even count — average the two middle values
            return (maxHeap.peek() + minHeap.peek()) / 2.0;
        }
        // Odd count — maxHeap holds the extra element
        return maxHeap.peek();
    }
}`

import java.util.List;

public class LongestIncreasingSubsequence {

    public int lengthOfLIS(int[] nums) {
        List<Integer> tails = new ArrayList<>();

        for (int num : nums) {
            int pos = binarySearch(tails, num);

            if (pos == tails.size()) {
                tails.add(num);          // extends the LIS
            } else {
                tails.set(pos, num);     // replaces with a smaller tail

        }
        return tails.size();

            if (tails.get(mid) < num) lo = mid + 1;

<p><b>Luhn rules:</b></p>
<ul style="margin-left:18px;margin-top:6px;line-height:1.8;color:var(--text2)">
<li>Starting from the <strong>rightmost digit</strong>, double every second digit.</li>
<li>If doubling produces a number > 9, subtract 9.</li>
<li>Sum all digits. If the total modulo 10 equals 0 — the number is valid.</li>
</ul>`,
  examples:[
    {input:'cardNumber = "4532015112830366"',output:"true",explanation:"Sum of transformed digits = 40, 40 % 10 = 0 → valid."},
    {input:'cardNumber = "1234567890123456"',output:"false",explanation:"Sum is not divisible by 10."},

  constraints:["Card number may contain spaces or dashes","13 ≤ digit count ≤ 19"],
  approach:`<p>Iterate the card number from <strong>right to left</strong>. Every second digit gets doubled; if the result > 9, subtract 9. Accumulate the sum and check divisibility by 10.</p>`,
  steps:["Strip all spaces and dashes.","Traverse from right to left, tracking an 'alternate' flag.","When alternate=true: digit *= 2; if digit > 9, digit -= 9.","Add digit to sum, toggle alternate.","Return sum % 10 == 0."],
  code:`public class LuhnAlgorithm {

    public boolean isValidCard(String cardNumber) {
        // Strip spaces and dashes
        cardNumber = cardNumber.replaceAll("[\\\\s\\\\-]", "");

        int     sum       = 0;
        boolean alternate = false;   // starts false for the rightmost digit

        for (int i = cardNumber.length() - 1; i >= 0; i--) {
            int digit = cardNumber.charAt(i) - '0';

            if (alternate) {
                digit *= 2;
                if (digit > 9) digit -= 9;   // same as summing the two digits
            }

            sum += digit;
            alternate = !alternate;
        }
        return sum % 10 == 0;
    }

    // Generate a valid card number check digit (common follow-up)
    public int getCheckDigit(String partialNumber) {
        // Append a 0, run Luhn, return the digit that makes sum % 10 == 0
        String withZero = partialNumber + "0";
        int sum = 0;
        boolean alternate = false;
        for (int i = withZero.length() - 1; i >= 0; i--) {
            int d = withZero.charAt(i) - '0';
            if (alternate) { d *= 2; if (d > 9) d -= 9; }
            sum += d;
            alternate = !alternate;
        }
        return (10 - (sum % 10)) % 10;
    }
}`

public class MinStack {

        minStack = new Stack<>();

    public void push(int val) {

        ListNode(int val) { this.val = val; }
    }

    public ListNode mergeKLists(ListNode[] lists) {
        // Min-heap: smallest node value at the top
        PriorityQueue<ListNode> heap =
            new PriorityQueue<>((a, b) -> a.val - b.val);

    public int minMeetingRooms(int[][] intervals) {

  approach:`<p><strong>QuickSelect</strong> (avg O(n)): partition the array around a pivot. If the pivot lands at position k-1 from the right — we found it. Otherwise recurse into the correct half only.</p>`,
  steps:["QuickSelect: choose a pivot (last element).","Partition: move all elements > pivot to the left.","If pivot index == k-1 → return pivot.","If k-1 < pivot index → recurse left.","Else → recurse right with adjusted k."],
  code:`import java.util.Random;

public class KthLargestElement {

    private Random rand = new Random();

    public int findKthLargest(int[] nums, int k) {
        return quickSelect(nums, 0, nums.length - 1, k - 1);
    }

    // Find element at index k when sorted descending
    private int quickSelect(int[] nums, int lo, int hi, int k) {
        if (lo == hi) return nums[lo];

        // Random pivot to avoid worst-case O(n²)
        int pivotIdx = lo + rand.nextInt(hi - lo + 1);
        swap(nums, pivotIdx, hi);

        int pivot = nums[hi], p = lo;
        for (int i = lo; i < hi; i++) {
            if (nums[i] >= pivot) swap(nums, i, p++); // descending order
        }
        swap(nums, p, hi);

        if      (p == k) return nums[p];
        else if (p >  k) return quickSelect(nums, lo, p - 1, k);
        else             return quickSelect(nums, p + 1, hi, k);
    }

    private void swap(int[] nums, int i, int j) {
        int tmp = nums[i]; nums[i] = nums[j]; nums[j] = tmp;
    }
}`

            node = node.children[idx];

        node.isEnd = true;

        Deque<Integer> deque = new ArrayDeque<>();  // stores indices

        int curEnd  = 0;  // end of the current jump range
        int farthest = 0; // farthest index reachable so far

        // No need to jump from the last index
        for (int i = 0; i < nums.length - 1; i++) {
            farthest = Math.max(farthest, i + nums[i]);

            // We've used up all positions in the current jump range
            if (i == curEnd) {
                jumps++;
                curEnd = farthest;
                if (curEnd >= nums.length - 1) break;
            }
        }
        return jumps;
    }
}`
},
{
  id:34, title:"Unique Paths", difficulty:"Medium", acceptance:"63.7%",
  tags:["Math","Dynamic Programming","Combinatorics","Mastercard"], freq:"High",
  time:"O(m×n)", space:"O(n)",
  mcNote:"Grid DP is a foundational problem in Mastercard SWE2 interviews — often used as a warm-up to assess DP fundamentals before harder problems. Know the math formula shortcut as well.",
  description:`<p>There is a robot on an <code>m × n</code> grid. The robot can only move <strong>right or down</strong>. How many unique paths are there from the top-left to the bottom-right corner?</p>`,
  examples:[
    {input:"m = 3, n = 7",output:"28"},
    {input:"m = 3, n = 2",output:"3",explanation:"Right→Down→Down, Down→Down→Right, Down→Right→Down."},
  ],
  constraints:["1 ≤ m, n ≤ 100"],
  approach:`<p><strong>1D DP</strong>: <code>dp[j]</code> = paths to reach column j in the current row. For each row, update <code>dp[j] += dp[j-1]</code> (paths from left). This compresses the 2D table to O(n) space.</p>`,
  steps:["dp[0..n-1] = 1 (only one way to reach any cell in the first row).","For each row r from 1 to m-1:","  For each col c from 1 to n-1:","    dp[c] += dp[c-1]  (from above + from left).","Return dp[n-1]."],
  code:`public class UniquePaths {

    public int uniquePaths(int m, int n) {
        int[] dp = new int[n];
        java.util.Arrays.fill(dp, 1);   // first row: 1 path to each cell

        for (int row = 1; row < m; row++) {
            for (int col = 1; col < n; col++) {
                dp[col] += dp[col - 1]; // paths from above + paths from left
            }
        }
        return dp[n - 1];
    }

    // Math shortcut: C(m+n-2, m-1) — for follow-up discussion
    public int uniquePathsMath(int m, int n) {
        long result = 1;
        // C(m+n-2, m-1) = (m+n-2)! / ((m-1)! * (n-1)!)
        for (int i = 0; i < m - 1; i++) {
            result = result * (n + i) / (i + 1);
        }
        return (int) result;
    }
}`
},

  description:`<p>A <strong>path</strong> in a binary tree is a sequence of nodes where each pair of adjacent nodes has an edge connecting them. A node can only appear in the sequence <strong>at most once</strong>. The path does not need to pass through the root.</p>
<p>Given the root of a binary tree, return the <strong>maximum path sum</strong>.</p>`,
  examples:[
    {input:"root = [1,2,3]",output:"6",explanation:"The optimal path is 2→1→3 with sum = 6."},
    {input:"root = [-10,9,20,null,null,15,7]",output:"42",explanation:"The optimal path is 15→20→7 with sum = 42."},
  ],
  constraints:["The number of nodes in the tree is in range [1, 3×10⁴]","-1000 ≤ Node.val ≤ 1000"],
  approach:`<p>Post-order DFS. At each node: compute the max one-sided path through left and right (clamp negatives to 0). Update global max with <code>node.val + leftGain + rightGain</code> (the arch through this node). Return <code>node.val + max(leftGain, rightGain)</code> to the parent (a path can only go one direction).</p>`,
  steps:["maxSum = Integer.MIN_VALUE (global).","DFS returns: max one-sided gain from this node upward.","  leftGain  = max(0, dfs(left))   — ignore negative subtrees.","  rightGain = max(0, dfs(right)).","  Update maxSum = max(maxSum, node.val + leftGain + rightGain).","  Return node.val + max(leftGain, rightGain)."],
  code:`public class BinaryTreeMaximumPathSum {

    static class TreeNode {
        int val; TreeNode left, right;
        TreeNode(int val) { this.val = val; }
    }

    private int maxSum = Integer.MIN_VALUE;

    public int maxPathSum(TreeNode root) {
        dfs(root);
        return maxSum;
    }

    // Returns max one-sided gain going UP from this node
    private int dfs(TreeNode node) {
        if (node == null) return 0;

        // Clamp to 0: don't use a subtree if it's negative
        int leftGain  = Math.max(0, dfs(node.left));
        int rightGain = Math.max(0, dfs(node.right));

        // Path through this node (arch): left → node → right
        int pathSum = node.val + leftGain + rightGain;
        maxSum = Math.max(maxSum, pathSum);

        // Return only the better single branch to the parent
        return node.val + Math.max(leftGain, rightGain);
    }
}`
}

// ════════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════════
let currentFilter   = 'All';
let currentProblem  = null;
let solvedSet       = new Set(JSON.parse(localStorage.getItem('solved')||'[]'));
let isDark          = true;

// ════════════════════════════════════════════════════════════════════════════
// JAVA SYNTAX HIGHLIGHTER
// ════════════════════════════════════════════════════════════════════════════
function highlight(code) {
  const keywords = ['public','private','protected','class','interface','extends',
    'implements','new','return','if','else','while','for','break','continue',
    'void','int','boolean','double','long','char','String','true','false','null',
    'static','final','import','package','this','super','throw','throws','try',
    'catch','finally','instanceof','switch','case','default','abstract','enum',
    'Override','SuppressWarnings'];
  const types = ['HashMap','HashSet','ArrayList','LinkedHashMap','PriorityQueue',
    'List','Map','Set','Queue','Deque','Stack','Arrays','Collections','Math',
    'Integer','Boolean','Character','Double','Long','Object','StringBuilder',
    'ListNode','TreeNode'];

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const lines = code.split('\n');
  return lines.map(rawLine => {
    const line = esc(rawLine);
    // comments
    if (/^\s*\/\//.test(line))
      return `<span class="cmt">${line}</span>`;

    let result = line
      // string literals
      .replace(/"([^"]*)"/g, (_,s) => `<span class="str">"${s}"</span>`)
      // char literals
      .replace(/'(\\?.)'(?!>)/g, (_,s) => `<span class="str">'${s}'</span>`)
      // annotations
      .replace(/(@\w+)/g, `<span class="ann">$1</span>`)
      // numbers
      .replace(/\b(\d[\d_]*\.?\d*[fFdDlL]?)\b/g, `<span class="num">$1</span>`);

    // types
    types.forEach(t => {
      result = result.replace(
        new RegExp(`\\b(${t})\\b`, 'g'),
        `<span class="type">$1</span>`
      );
    });
    // keywords
    keywords.forEach(k => {
      result = result.replace(
        new RegExp(`\\b(${k})\\b`, 'g'),
        `<span class="kw">$1</span>`
      );
    });
    return result;
  }).join('\n');
}

function buildCodeTable(code) {
  const lines = code.split('\n');
  const hl    = highlight(code).split('\n');
  let rows    = '';
  lines.forEach((_, i) => {
    rows += `<tr>
      <td class="ln-col">${i+1}</td>
      <td class="code-col">${hl[i]}</td>
    </tr>`;
  });
  return `<div class="code-wrap"><div class="code-pre"><table class="code-table">${rows}</table></div></div>`;
}

// ════════════════════════════════════════════════════════════════════════════
// RENDER SIDEBAR
// ════════════════════════════════════════════════════════════════════════════
function renderList() {
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('probList');
  const filtered = PROBLEMS.filter(p => {
    const matchDiff = currentFilter==='All' || p.difficulty===currentFilter || (currentFilter==='Mastercard' && p.tags.includes('Mastercard'));
    const matchQ    = !q || p.title.toLowerCase().includes(q)
                       || p.tags.some(t=>t.toLowerCase().includes(q));
    return matchDiff && matchQ;
  });

  list.innerHTML = filtered.map(p => `
    <div class="prob-row ${solvedSet.has(p.id)?'solved':''} ${currentProblem?.id===p.id?'active':''}"
         onclick="openProblem(${p.id})">
      <div class="prob-num">${p.id}</div>
      <div class="prob-title-wrap">
        <div class="prob-title-text">${p.title}</div>
        <div class="prob-tags-row">${p.tags.slice(0,3).map(t=>`<span class="prob-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="prob-meta">
        ${p.tags.includes('Mastercard')?'<span class="mc-badge">⬤ MC</span>':''}
        <span class="diff-badge ${p.difficulty}">${p.difficulty}</span>
        <span class="acc-rate">${p.acceptance}</span>
      </div>
    </div>`).join('');

  updateProgress();
}

// ════════════════════════════════════════════════════════════════════════════
// RENDER CONTENT
// ════════════════════════════════════════════════════════════════════════════
function openProblem(id) {
  currentProblem = PROBLEMS.find(p=>p.id===id);
  renderList();

  const p   = currentProblem;
  const solved = solvedSet.has(p.id);

  document.getElementById('contentArea').innerHTML = `
    <div class="prob-header">
      <div class="prob-header-top">
        <h1>#${p.id}. ${p.title}</h1>
        <span class="diff-pill ${p.difficulty}">${p.difficulty}</span>
        ${solved?'<span class="solved-icon">✔ Solved</span>':''}
      </div>
      <div class="tag-list">
        ${p.tags.map(t=>`<span class="tag-pill">${t}</span>`).join('')}
        ${p.freq ? `<span class="mc-freq-badge ${p.freq==='Very High'?'very-high':'high'}">🎯 Mastercard: ${p.freq} Frequency</span>` : ''}
      </div>
      <div class="complexity-row">
        <span class="cplx">Time: <b>${p.time}</b></span>
        <span class="cplx">Space: <b>${p.space}</b></span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'desc')">📋 Description</button>
      <button class="tab-btn" onclick="switchTab(this,'approach')">💡 Approach</button>
      <button class="tab-btn" onclick="switchTab(this,'solution')">☕ Solution</button>
      <button class="tab-btn" onclick="switchTab(this,'schema')">🗂 Schema</button>
    </div>

    <div class="tab-panels">

      <!-- DESCRIPTION -->
      <div class="tab-panel active" id="tab-desc">
        <div class="desc-text">${p.description}</div>
        ${p.examples.map((ex,i)=>`
          <div class="ex-block">
            <div class="ex-label">Example ${i+1}</div>
            <div><code><b>Input:</b>  ${ex.input}</code></div>
            <div><code><b>Output:</b> ${ex.output}</code></div>
            ${ex.explanation?`<div style="margin-top:4px;color:var(--text3);font-size:12px"><b>Explanation:</b> ${ex.explanation}</div>`:''}
          </div>`).join('')}
        <div class="constraint-list">
          <div style="font-weight:700;color:var(--text2);margin-bottom:6px;font-size:13px">Constraints</div>
          <ul>${p.constraints.map(c=>`<li>${c}</li>`).join('')}</ul>
        </div>
        <div style="margin-top:20px;display:flex;gap:10px">
          <button class="nav-btn primary" onclick="markSolved(${p.id})">
            ${solved?'✔ Solved':'Mark as Solved'}
          </button>
        </div>
      </div>

      <!-- APPROACH -->
      <div class="tab-panel" id="tab-approach">
        <div class="approach-card">
          <h3><span class="icon">💡</span> Key Insight</h3>
          <p>${p.approach}</p>
        </div>
        <div class="approach-card">
          <h3><span class="icon">📝</span> Step-by-Step Algorithm</h3>
          <ol class="step-list">${p.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
        </div>
        ${p.mcNote ? `<div class="mc-section"><h4>⭐ Why Mastercard Asks This</h4><p style="font-size:13px;color:var(--text2)">${p.mcNote}</p></div>` : ''}
        <div class="approach-card" style="border-color:var(--blue3)">
          <h3><span class="icon">⏱</span> Complexity Analysis</h3>
          <p><b style="color:var(--cyan)">Time:</b> ${p.time} &nbsp;&nbsp;
             <b style="color:var(--cyan)">Space:</b> ${p.space}</p>
        </div>
      </div>

      <!-- SOLUTION -->
      <div class="tab-panel" id="tab-solution">
        <div class="code-toolbar">
          <span class="lang-badge">Java</span>
          <span class="spacer"></span>
          <button class="copy-btn" id="copyBtn" onclick="copyCode()">⎘ Copy</button>
        </div>
        ${buildCodeTable(p.code)}
      </div>

      <!-- SCHEMA -->
      <div class="tab-panel" id="tab-schema">
        ${SCHEMAS[p.id] || '<div style="color:var(--text3);padding:20px">No schema available.</div>'}
      </div>
    </div>`;
}

function switchTab(btn, name) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ════════════════════════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════════════════════════
function markSolved(id) {
  if (solvedSet.has(id)) solvedSet.delete(id);
  else solvedSet.add(id);
  localStorage.setItem('solved', JSON.stringify([...solvedSet]));
  openProblem(id);
  toast(solvedSet.has(id) ? '✔ Marked as solved!' : 'Unmarked.');
}

function copyCode() {
  if (!currentProblem) return;
  navigator.clipboard.writeText(currentProblem.code).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent='✔ Copied!'; btn.classList.add('copied'); }
    setTimeout(() => {
      if (btn) { btn.textContent='⎘ Copy'; btn.classList.remove('copied'); }
    }, 2000);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filterProblems() { renderList(); }

function updateProgress() {
  const total  = PROBLEMS.length;
  const solved = solvedSet.size;
  const easy   = PROBLEMS.filter(p=>p.difficulty==='Easy'  && solvedSet.has(p.id)).length;
  const med    = PROBLEMS.filter(p=>p.difficulty==='Medium'&& solvedSet.has(p.id)).length;
  const hard   = PROBLEMS.filter(p=>p.difficulty==='Hard'  && solvedSet.has(p.id)).length;

  document.getElementById('solvedCount').textContent = solved;
  document.getElementById('easyCount').textContent   = easy;
  document.getElementById('medCount').textContent    = med;
  document.getElementById('hardCount').textContent   = hard;
  document.getElementById('progressLabel').textContent = `${solved} / ${total}`;
  document.getElementById('progressFill').style.width = `${(solved/total)*100}%`;
}

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.classList.toggle('light', !isDark);
  document.querySelector('.nav-btn.ghost').textContent = isDark ? '🌙 Theme' : '☀️ Theme';
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════
renderList();
</script>
